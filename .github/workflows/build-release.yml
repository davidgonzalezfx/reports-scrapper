name: Build and Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers to local folder
        run: playwright install chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: playwright-browsers

      - name: Create build token file
        run: |
          # Create a file that contains the built-in token
          # This file will be imported by log_uploader.py
          $tokenContent = @"
  # Auto-generated at build time - contains GitHub token for log uploads
  BUILT_IN_GITHUB_TOKEN = "${{ secrets.LOG_UPLOAD_TOKEN }}"
  "@
          $tokenContent | Out-File -FilePath "_build_token.py" -Encoding utf8
          echo "Created _build_token.py"

      - name: Build with PyInstaller
        run: pyinstaller --clean --noconfirm app.spec
        env:
          GITHUB_LOG_REPO: davidgonzalezfx/reports-scrapper
          REMOTE_CONFIG_URL: https://raw.githubusercontent.com/davidgonzalezfx/reports-scrapper/main/remote_config.json

      - name: Prepare release package
        run: |
          # Copy playwright-browsers next to the executable
          # Copy-Item -Path playwright-browsers -Destination dist/app/playwright-browsers -Recurse
          # Create zip with app folder contents
          Compress-Archive -Path dist/app/* -DestinationPath dist/app-v${{ github.run_number }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: dist/app-v${{ github.run_number }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
